<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow border-0 p-4">
        <div class="text-center mb-4">
          <i class="bi bi-person-lock fs-1 text-primary"></i>
          <h2 class="h4">Acceso al Sistema</h2>
        </div>
        
        <form (ngSubmit)="onSubmit()">
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-3">
            Ingresar
          </button>
        </form>

        <div class="text-center my-3">
          <span class="text-muted small">ó</span>
          <hr class="mt-2">
        </div>

        <div class="d-flex justify-content-center">
          <asl-google-signin-button type="standard" size="large" text="signin_with"></asl-google-signin-button>
        </div>
        
        <div class="text-center mt-3">
          <a routerLink="/catalogo" class="text-muted small text-decoration-none">Volver al catálogo</a>
        </div>
      </div>
    </div>
  </div>
</div>
