<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow border-0 p-4 rounded-4">
        <div class="text-center mb-4 text-dark">
          <i class="bi bi-person-lock fs-1 text-primary"></i>
          <h2 class="h4 fw-bold">Acceso al Sistema</h2>
        </div>
        
        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <input type="email" name="email" [(ngModel)]="email" class="form-control rounded-pill bg-light border-0" placeholder="Correo Electrónico" required>
          </div>
          <div class="mb-3">
            <input type="password" name="password" [(ngModel)]="password" class="form-control rounded-pill bg-light border-0" placeholder="Contraseña" required>
          </div>

          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 mt-2 shadow-sm">
            Ingresar
          </button>
        </form>

        <div class="text-center my-3">
          <hr class="text-muted">
          <span class="text-muted small bg-white px-2 position-relative" style="top: -25px;">ó</span>
        </div>

        <div class="d-flex justify-content-center">
          <div id="googleBtn"></div>
        </div>
        
        <div class="text-center mt-4">
          <a routerLink="/catalogo" class="text-muted small text-decoration-none fw-bold">Volver al catálogo</a>
        </div>
      </div>
    </div>
  </div>
</div>
