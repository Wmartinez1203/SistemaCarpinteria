<div class="container mt-5 text-dark" style="min-height: 70vh;">
  <h2 class="fw-bold">Mi Carrito 🛒</h2>
  <p class="text-muted">Herencia en Madera - Carpintería Figueroa</p>
  <hr>

  <div *ngIf="items.length === 0" class="alert alert-warning text-center py-5 shadow-sm border-0">
    <h4 class="mb-3">Tu carrito está vacío</h4>
    <p>Aún no has agregado ninguna obra de arte a tu lista.</p>
    <a routerLink="/catalogo" class="btn btn-dark fw-bold rounded-pill px-4">Ir al catálogo</a>
  </div>

  <div class="row" *ngIf="items.length > 0">
    <div class="col-md-8">
      <div class="card mb-3 p-3 shadow-sm border-0" *ngFor="let item of items" style="border-radius: 15px;">
        <div class="d-flex align-items-center">
          <img [src]="item.imagen_url || item.imagen" class="rounded shadow-sm" 
               style="height: 90px; width: 90px; object-fit: cover;">
          <div class="ms-4 flex-grow-1">
            <h5 class="mb-1 fw-bold">{{item.nombre}}</h5>
            <p class="text-primary mb-0 fw-bold fs-5">$ {{item.precio}}</p>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-4 bg-light border-0 shadow-lg sticky-top" style="top: 20px; border-radius: 20px;">
        <h4 class="fw-bold mb-4">Resumen</h4>
        <div class="d-flex justify-content-between mb-3 fs-5 border-top pt-3">
            <span class="fw-bold">Total:</span>
            <span class="text-success fw-bold">$ {{total}}</span>
        </div>
        <button class="btn btn-primary btn-lg w-100 mt-2 rounded-pill shadow-sm" (click)="finalizar()">
            Finalizar Compra
        </button>
        <p class="text-center text-muted small mt-3">Facturación electrónica avalada</p>
      </div>
    </div>
  </div>
</div>
