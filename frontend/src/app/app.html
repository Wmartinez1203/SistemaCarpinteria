<nav class="navbar navbar-dark bg-dark p-3">
  <div class="container">
    <span class="navbar-brand">🛠️ {{ title }}</span>
    <span class="text-white small italic">Bienvenido, {{ usuario }}</span>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="mb-4">Nuestro Catálogo</h2>
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let m of muebles">
      <div class="card shadow-sm h-100">
        <img [src]="m.imagen" class="card-img-top" [alt]="m.nombre" style="height: 200px; object-fit: cover;">
        <div class="card-body">
          <h5 class="card-title">{{ m.nombre }}</h5>
          <p class="text-muted small">{{ m.categoria }}</p>
          <p class="fw-bold text-primary">${{ m.precio }}</p>
          <button class="btn btn-outline-dark btn-sm w-100">Ver detalles</button>
        </div>
      </div>
    </div>
  </div>
</div>
