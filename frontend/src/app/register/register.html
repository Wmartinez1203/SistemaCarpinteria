<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0 p-4 rounded-4 bg-white text-dark">
        <div class="text-center mb-4">
          <h2 class="h3 fw-bold">Crear Cuenta</h2>
          <p class="text-muted small">Únete a Muebles Figueroa</p>
        </div>

        <div class="d-grid gap-3">
          <button type="button" class="btn btn-outline-danger rounded-pill py-2 fw-bold shadow-sm" (click)="loginGoogle()">
            <i class="bi bi-google me-2"></i> Continuar con Google
          </button>
        </div>

        <div class="d-flex align-items-center my-4">
          <hr class="flex-grow-1">
          <span class="mx-3 text-muted small">o usa tu correo</span>
          <hr class="flex-grow-1">
        </div>

        <form #regForm="ngForm" (ngSubmit)="onRegister(regForm.value)">
          <div class="mb-3">
            <input type="text" name="nombre" ngModel class="form-control rounded-pill border-light bg-light px-3" placeholder="Nombre completo" required>
          </div>
          <div class="mb-3">
            <input type="email" name="email" ngModel class="form-control rounded-pill border-light bg-light px-3" placeholder="Correo electrónico" required>
          </div>
          
          <div class="mb-3">
            <div class="input-group">
              <input [type]="showPassword ? 'text' : 'password'" name="password" ngModel class="form-control rounded-start-pill border-light bg-light px-3" placeholder="Contraseña" required>
              <button class="btn btn-light rounded-end-pill border-light" type="button" (click)="showPassword = !showPassword">
                <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
              </button>
            </div>
          </div>

          <button type="submit" [disabled]="!regForm.valid" class="btn btn-dark w-100 rounded-pill py-2 shadow mt-2">Registrarse</button>
        </form>

        <p class="text-center mt-4 small">
          ¿Ya tienes cuenta? <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Ingresa</a>
        </p>
      </div>
    </div>
  </div>
</div>
