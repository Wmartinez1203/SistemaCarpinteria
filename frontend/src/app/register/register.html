<div class="container mt-5 text-dark">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0 p-4 rounded-4">
        <div class="text-center mb-4">
          <h2 class="h3 fw-bold text-dark">Crear Cuenta</h2>
          <p class="text-muted small">Únete a la mejor carpintería de Quito</p>
        </div>

        <div class="d-grid gap-2 mb-4">
          <button class="btn btn-outline-danger rounded-pill" (click)="loginSocial('Google')">
            <i class="bi bi-google me-2"></i> Google
          </button>
          <button class="btn btn-outline-primary rounded-pill" (click)="loginSocial('Facebook')">
            <i class="bi bi-facebook me-2"></i> Facebook
          </button>
        </div>

        <div class="d-flex align-items-center my-3 text-muted">
          <hr class="flex-grow-1"> <span class="mx-2 small">o usa tu correo</span> <hr class="flex-grow-1">
        </div>

        <form (ngSubmit)="onRegister()">
          <div class="mb-3">
            <input type="text" name="nombre" [(ngModel)]="nombre" class="form-control rounded-pill" placeholder="Nombre completo" required>
          </div>
          <div class="mb-3">
            <input type="email" name="email" [(ngModel)]="email" class="form-control rounded-pill" placeholder="Correo electrónico" required>
          </div>
          <div class="mb-3">
            <input type="password" name="pass" [(ngModel)]="password" class="form-control rounded-pill" placeholder="Contraseña" required>
          </div>
          <button type="submit" class="btn btn-dark w-100 rounded-pill py-2 shadow">Registrarse</button>
        </form>

        <p class="text-center mt-4 small">
          ¿Ya tienes cuenta? <a routerLink="/login" class="text-primary fw-bold text-decoration-none">Ingresa</a>
        </p>
      </div>
    </div>
  </div>
</div>
