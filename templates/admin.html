{% extends "base.html" %}
{% block content %}
<div class="container mb-5">
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card shadow p-4 border-0" style="border-radius: 20px;">
                <h4 class="fw-bold mb-3"><i class="fas fa-plus-circle text-success me-2"></i>Agregar Mueble</h4>
                <form action="/admin/agregar" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input type="text" name="nombre" class="form-control" placeholder="Nombre del mueble" required>
                    </div>
                    <div class="mb-3">
                        <select name="categoria" class="form-select">
                            <option value="Dormitorio">Dormitorio</option>
                            <option value="Sala">Sala</option>
                            <option value="Oficina">Oficina</option>
                            <option value="Cocina">Cocina</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <input type="text" name="subcategoria" class="form-control" placeholder="Subcategoría (ej: Camas)" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" name="medidas" class="form-control" placeholder="Medidas (ej: 160x200cm)" required>
                    </div>
                    <div class="mb-3">
                        <input type="number" name="precio" step="0.01" class="form-control" placeholder="Precio ($)" required>
                    </div>
                    <div class="mb-3">
                        <input type="number" name="stock" class="form-control" placeholder="Stock disponible" required>
                    </div>
                    <div class="mb-3">
                        <textarea name="detalle" class="form-control" placeholder="Detalles de la madera y acabados"></textarea>
                    </div>
                    <div class="mb-3">
                        <input type="file" name="imagen" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 fw-bold rounded-pill py-2">Guardar Mueble</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            <h4 class="fw-bold mb-3">Inventario Actual</h4>
            <div class="table-responsive card shadow border-0 p-3" style="border-radius: 20px;">
                <table class="table align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Imagen</th>
                            <th>Mueble</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th class="text-center">Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for m in muebles %}
                        <tr>
                            <td><img src="{{ url_for('display_image', filename=m.imagen) }}" width="60" class="rounded shadow-sm"></td>
                            <td>
                                <div class="fw-bold">{{ m.nombre }}</div>
                                <small class="text-muted">{{ m.categoria }}</small>
                            </td>
                            <td class="text-success fw-bold">${{ m.precio }}</td>
                            <td><span class="badge bg-light text-dark border">{{ m.stock }} u.</span></td>
                            <td class="text-center">
                                <a href="{{ url_for('eliminar_mueble', id=m.id) }}" class="btn btn-sm btn-outline-danger rounded-pill px-3" onclick="return confirm('¿Fernando, estás seguro de borrar este mueble?')">
                                    <i class="fas fa-trash me-1"></i> Eliminar
                                </a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
