<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; font-family: 'Poppins', sans-serif; }
        .navbar { background: #2c3e50; }
        .img-zoom-container { position: relative; cursor: none; border-radius: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .lens { position: absolute; border: 2px solid #fff; border-radius: 50%; width: 160px; height: 160px; visibility: hidden; pointer-events: none; box-shadow: 0 0 15px rgba(0,0,0,0.4); z-index: 100; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark mb-5 shadow-sm">
    <div class="container"><a class="navbar-brand fw-bold" href="/">MUEBLES FIGUEROA</a></div>
</nav>

<div class="container py-4">
    <a href="/catalogo" class="btn btn-outline-dark mb-4 rounded-pill px-4"><i class="fas fa-arrow-left me-2"></i>Volver al Catálogo</a>
    <div class="row g-5">
        <div class="col-lg-7">
            <div class="img-zoom-container" id="z-cont">
                <div id="lens" class="lens"></div>
                <img id="m-img" src="{{ url_for('display_image', filename=mueble.imagen) }}" class="w-100">
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card border-0 p-4 shadow-sm h-100" style="border-radius: 25px;">
                <h1 class="fw-bold mb-3 text-dark">{{ mueble.nombre }}</h1>
                <h2 class="text-success fw-bold mb-4">${{ mueble.precio }}</h2>
                <div class="bg-light p-3 rounded-3 mb-4"><p class="mb-0 text-muted"><i class="fas fa-ruler-combined me-2"></i>{{ mueble.medidas }}</p></div>
                <p class="fs-5 text-secondary">{{ mueble.detalle }}</p>
                <div class="d-grid mt-5">
                    <a href="{{ url_for('add_cart', id=mueble.id) }}" class="btn btn-dark btn-lg py-3 rounded-pill fw-bold">AÑADIR AL PEDIDO</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
function startZoom() {
    let img = document.getElementById("m-img"), lens = document.getElementById("lens"), cont = document.getElementById("z-cont");
    lens.style.backgroundImage = `url('${img.src}')`;
    lens.style.backgroundSize = `${img.width * 2}px ${img.height * 2}px`;
    cont.addEventListener("mousemove", (e) => {
        lens.style.visibility = "visible";
        let r = img.getBoundingClientRect();
        let x = e.pageX - r.left - window.pageXOffset - (lens.offsetWidth / 2);
        let y = e.pageY - r.top - window.pageYOffset - (lens.offsetHeight / 2);
        if(x<0) x=0; if(x>img.width-lens.offsetWidth) x=img.width-lens.offsetWidth;
        if(y<0) y=0; if(y>img.height-lens.offsetHeight) y=img.height-lens.offsetHeight;
        lens.style.left = x + "px"; lens.style.top = y + "px";
        lens.style.backgroundPosition = `-${x*2}px -${y*2}px`;
    });
    cont.addEventListener("mouseleave", () => lens.style.visibility = "hidden");
}
window.onload = startZoom;
</script>
</body>
</html>
