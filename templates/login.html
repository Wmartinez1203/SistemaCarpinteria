<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2c3e50 0%, #000000 100%); height: 100vh; display: flex; align-items: center; }
        .card { border-radius: 20px; border: none; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .btn-success { background: #198754; border: none; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Muebles Figueroa</h2>
                    <p class="text-muted">Inicia sesión como Admin o Cliente</p>
                </div>
                {% with messages = get_flashed_messages() %}
                  {% if messages %}<div class="alert alert-danger small">{{ messages[0] }}</div>{% endif %}
                {% endwith %}
                <form method="POST">
                    <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="Correo" required></div>
                    <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Contraseña" required></div>
                    <button type="submit" class="btn btn-success w-100">INGRESAR</button>
                </form>
                <div class="text-center mt-3"><a href="/registro" class="text-decoration-none small text-muted">¿No tienes cuenta? Regístrate</a></div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
